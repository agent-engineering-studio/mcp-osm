name: Deploy to Azure Container Apps

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag (default: commit SHA short)"
        required: false
        default: ""
  push:
    tags:
      - "v*.*.*"

permissions:
  id-token: write   # OIDC federated login to Azure
  contents: read

env:
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP || 'rg-osm-mcp' }}
  AZURE_LOCATION: ${{ vars.AZURE_LOCATION || 'westeurope' }}
  AZURE_ACR_NAME: ${{ vars.AZURE_ACR_NAME }}
  AZURE_CONTAINER_APP_ENV: ${{ vars.AZURE_CONTAINER_APP_ENV || 'cae-osm-mcp' }}
  AZURE_MCP_APP_NAME: ${{ vars.AZURE_MCP_APP_NAME || 'osm-mcp' }}
  AZURE_AGENT_APP_NAME: ${{ vars.AZURE_AGENT_APP_NAME || 'osm-agent' }}

jobs:
  deploy:
    name: Build & deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.image_tag }}"
          if [ -z "$TAG" ]; then
            if [[ "$GITHUB_REF" == refs/tags/* ]]; then
              TAG="${GITHUB_REF#refs/tags/}"
            else
              TAG="${GITHUB_SHA::7}"
            fi
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name "${AZURE_ACR_NAME}"

      - name: Build & push MCP image
        run: |
          IMG="${AZURE_ACR_NAME}.azurecr.io/${AZURE_MCP_APP_NAME}:${{ steps.tag.outputs.tag }}"
          docker build -t "$IMG" ./osm-mcp
          docker push "$IMG"
          echo "MCP_IMAGE=$IMG" >> $GITHUB_ENV

      - name: Build & push Agent image
        run: |
          IMG="${AZURE_ACR_NAME}.azurecr.io/${AZURE_AGENT_APP_NAME}:${{ steps.tag.outputs.tag }}"
          docker build -t "$IMG" ./osm-agent
          docker push "$IMG"
          echo "AGENT_IMAGE=$IMG" >> $GITHUB_ENV

      - name: Deploy via script
        env:
          IMAGE_TAG: ${{ steps.tag.outputs.tag }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          OLLAMA_BASE_URL: ${{ secrets.OLLAMA_BASE_URL }}
          OLLAMA_LLM_MODEL: ${{ vars.OLLAMA_LLM_MODEL || 'qwen2.5:7b' }}
        run: |
          chmod +x ./scripts/deploy-azure.sh
          ./scripts/deploy-azure.sh --skip-build --skip-login
