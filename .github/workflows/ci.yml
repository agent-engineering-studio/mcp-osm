name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-mcp:
    name: Python MCP — lint + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./osm-mcp
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install package with dev deps
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check src tests

      - name: Pytest
        run: pytest -v

  dotnet-agent:
    name: .NET Agent — build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./osm-agent
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build -c Release --no-restore

  docker-build:
    name: Docker build smoke test
    runs-on: ubuntu-latest
    needs: [python-mcp, dotnet-agent]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build osm-mcp image
        uses: docker/build-push-action@v6
        with:
          context: ./osm-mcp
          push: false
          tags: osm-mcp:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build osm-agent image
        uses: docker/build-push-action@v6
        with:
          context: ./osm-agent
          push: false
          tags: osm-agent:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
